<!DOCTYPE html>
<html>
<head>
<title>Password Analyzer</title>

<style>
body {
    font-family: Arial;
    background: #111;
    color: #0f0;
    text-align: center;
    padding: 30px;
    transition: 0.3s;
}

.box {
    background: #1a1a1a;
    padding: 20px;
    border-radius: 10px;
    display: inline-block;
    width: 420px;
}

input {
    padding: 10px;
    width: 80%;
    margin-top: 10px;
}

button {
    padding: 10px;
    margin-top: 10px;
    cursor: pointer;
}

.red { color: red; }
.yellow { color: gold; }
.green { color: lime; }

.small {
    font-size: 14px;
    color: #aaa;
}
</style>
</head>

<body>

<div class="box">
<h2>Password Analyzer</h2>
<p class="small">Password strength tester</p>

<input type="text" id="password" placeholder="Enter password">
<br>
<button onclick="checkPassword()">Analyze</button>

<p id="output"></p>
<p id="time"></p>
<p id="strength"></p>
</div>

<script>
function checkPassword() {

    let pw = document.getElementById("password").value;

    let score = 0;
    let feedback = [];

    let hasUpper = /[A-Z]/.test(pw);
    let hasNumber = /[0-9]/.test(pw);
    let hasSymbol = /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(pw);

    // LENGTH
    if (pw.length >= 12) {
        score += 2;
    }

    if (hasUpper) score++;
    if (hasNumber) score++;
    if (hasSymbol) score++;

    // COMMON PASSWORDS
    let common = ["password","123456","qwerty","admin","letmein","welcome"];
    let isCommon = common.includes(pw.toLowerCase());

    if (isCommon) {
        score = 0;
    }

    // ===== FEEDBACK =====
    if (score <= 2) {
        if (pw.length < 12) feedback.push("Make it at least 12 characters long");
        if (!hasUpper) feedback.push("Add uppercase letters");
        if (!hasNumber) feedback.push("Add numbers");
        if (!hasSymbol) feedback.push("Add special characters (! @ # $)");
        if (isCommon) feedback.push("Do not use common passwords");
    }
    else if (score <= 4) {
        if (pw.length < 12) feedback.push("Increase the length");
        if (!hasSymbol) feedback.push("Adding symbols will strengthen it");
        feedback.push("Make it less predictable");
    }
    else {
        feedback.push("Strong password");
        feedback.push("Avoid real words for maximum security");
    }

    // ===== TIME =====
    let time = "";

    if (score <= 1) time = "Instantly crackable";
    else if (score == 2) time = "Minutes to hours";
    else if (score == 3) time = "Hours";
    else if (score == 4) time = "Years";
    else time = "Thousands of years";

    // ===== STRENGTH =====
    let strengthText = "";
    let colorClass = "";

    if (score <= 2) {
        strengthText = "WEAK";
        colorClass = "red";
        document.body.style.background = "#2a0000";
    }
    else if (score <= 4) {
        strengthText = "MEDIUM";
        colorClass = "yellow";
        document.body.style.background = "#2a2a00";
    }
    else {
        strengthText = "STRONG";
        colorClass = "green";
        document.body.style.background = "#002a00";
    }

    // ===== OUTPUT =====
    document.getElementById("output").innerHTML =
        "Score: " + score + " / 5";

    document.getElementById("time").innerHTML =
        "Estimated crack time: " + time;

    let feedbackText = "No suggestions needed.";
    if (feedback.length > 0) {
        feedbackText = "<b>Suggestions:</b><br>• " + feedback.join("<br>• ");
    }

    document.getElementById("strength").innerHTML =
        "Strength: <b class='" + colorClass + "'>" + strengthText + "</b><br><br>" +
        feedbackText;
}
</script>

</body>
</html>
